name: mail-ninja

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: campaign
      POSTGRES_PASSWORD: campaign
      POSTGRES_DB: campaign_mailer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign -d campaign_mailer"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  migrate:
    build: .
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://campaign:campaign@postgres:5432/campaign_mailer
    command: npm run db:migrate
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build: .
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://campaign:campaign@postgres:5432/campaign_mailer
    command: npm run db:seed
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  web:
    build: .
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://campaign:campaign@postgres:5432/campaign_mailer
    command: npm run start
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3000:3000"

  worker:
    build: .
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://campaign:campaign@postgres:5432/campaign_mailer
      WORKER_ID: worker-docker
    command: npm run worker
    depends_on:
      seed:
        condition: service_completed_successfully

volumes:
  postgres_data:
